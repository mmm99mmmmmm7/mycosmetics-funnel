<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const WHATSAPP_NUMBER = "491727130590";
const BIGCARTEL_BASE = "https://wwwmycosmeticsde.bigcartel.com";
const LEGAL = {
  impressum: `${BIGCARTEL_BASE}/impressum`,
  datenschutz: `${BIGCARTEL_BASE}/lieferung-versand-datenschutz-agb-s-agb-s-lashes-wiederrufsbelehrung`,
  agb: `${BIGCARTEL_BASE}/agb`,
};

const questions = [
  {
    question: "Wo stehst du gerade?",
    subtitle: "Wähle die Antwort, die am besten zu dir passt.",
    options: [
      { emoji: "💼", text: "Ich bin angestellt und will was Eigenes starten", ok: true },
      { emoji: "💅", text: "Ich bin im Beauty-Bereich und will mich weiterentwickeln", ok: true },
      { emoji: "⏰", text: "Ich suche einen flexiblen Nebenverdienst", ok: true },
      { emoji: "✨", text: "Ich bin neugierig und will mich informieren", ok: true },
    ],
  },
  {
    question: "Wann möchtest du am liebsten starten?",
    subtitle: "Es gibt kein Richtig oder Falsch.",
    options: [
      { emoji: "⚡", text: "So schnell wie möglich", ok: true },
      { emoji: "📅", text: "In den nächsten 2–4 Wochen", ok: true },
      { emoji: "🗓️", text: "In den nächsten 1–3 Monaten", ok: true },
      { emoji: "📖", text: "Ich will mich erstmal nur informieren", ok: true },
    ],
  },
  {
    question: "Könntest du dir vorstellen, ca. 50\u00A0€ monatlich in dein Starter-Equipment zu investieren?",
    subtitle: "Damit du direkt nach der Schulung loslegen kannst.",
    options: [
      { emoji: "✅", text: "Ja, das wäre kein Problem", ok: true },
      { emoji: "🤔", text: "Ja, wenn es sich lohnt – erzähl mir mehr", ok: true },
      { emoji: "💭", text: "Das müsste ich mir erstmal überlegen", ok: false },
      { emoji: "❌", text: "Nein, das ist gerade nicht drin", ok: false },
    ],
  },
];

const socialProof = [
  { name: "Lisa", city: "München", time: "vor 12 Min.", action: "hat den Check gestartet" },
  { name: "Sarah", city: "Nürnberg", time: "vor 28 Min.", action: "hat sich angemeldet" },
  { name: "Vanessa", city: "Augsburg", time: "vor 45 Min.", action: "hat den Check gemacht" },
  { name: "Julia", city: "Regensburg", time: "vor 1 Std.", action: "hat sich angemeldet" },
  { name: "Alina", city: "Ingolstadt", time: "vor 1 Std.", action: "hat den Check gestartet" },
  { name: "Laura", city: "Passau", time: "vor 2 Std.", action: "hat sich angemeldet" },
  { name: "Melina", city: "Landshut", time: "vor 2 Std.", action: "hat den Check gemacht" },
  { name: "Sophia", city: "Erlangen", time: "vor 3 Std.", action: "hat sich angemeldet" },
];

// ── Components ──

function Logo({ size = 48 }) {
  return (
    <div className="logo">
      <img src="assets/logo.jpg" alt="MY Cosmetics – Melisa Yelkenci" style={{ height: size + 'px' }} />
    </div>
  );
}

function LegalFooter() {
  return (
    <div className="legal-footer">
      <a href={LEGAL.impressum} target="_blank" rel="noopener">Impressum</a>
      <a href={LEGAL.datenschutz} target="_blank" rel="noopener">Datenschutz</a>
      <a href={LEGAL.agb} target="_blank" rel="noopener">AGB</a>
    </div>
  );
}

function SocialProofToast({ show }) {
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    if (!show) { setVisible(false); return; }
    const t1 = setTimeout(() => { setVisible(true); setTimeout(() => setVisible(false), 4000); }, 3000);
    const interval = setInterval(() => {
      setIdx(i => (i + 1) % socialProof.length);
      setVisible(true);
      setTimeout(() => setVisible(false), 4000);
    }, 7000);
    return () => { clearTimeout(t1); clearInterval(interval); };
  }, [show]);

  const e = socialProof[idx];
  return (
    <div className={`toast-container ${visible ? 'visible' : ''}`}>
      <div className="toast">
        <div className="toast-avatar">💅</div>
        <div style={{ flex: 1 }}>
          <div className="toast-name">{e.name} aus {e.city}</div>
          <div className="toast-action">{e.action} · {e.time}</div>
        </div>
        <div className="toast-live"></div>
      </div>
    </div>
  );
}

// ── Screens ──

function StartScreen({ onQuizDone }) {
  const [checkCount, setCheckCount] = useState(127);
  const [bump, setBump] = useState(false);
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [quizActive, setQuizActive] = useState(false);
  const [cardsPhase, setCardsPhase] = useState('enter'); // 'enter' | 'exit'
  const cardsRef = useRef([]);
  const boxRef = useRef(null);
  // Dynamische Urgency: Plätze je nach Wochentag (deterministisch über den Tag konstant)
  const initialSeats = (() => {
    const map = [5, 4, 4, 3, 3, 2, 2]; // So, Mo, Di, Mi, Do, Fr, Sa
    return map[new Date().getDay()];
  })();
  const [seats, setSeats] = useState(initialSeats);
  useEffect(() => {
    // Während der Session max. 1x runterzählen nach 60–180s (wenn mehr als 1 frei)
    const delay = 60000 + Math.random() * 120000;
    const t = setTimeout(() => setSeats(s => (s > 1 ? s - 1 : s)), delay);
    return () => clearTimeout(t);
  }, []);
  useEffect(() => {
    window.trackFunnelStep && window.trackFunnelStep('/');
  }, []);
  // Animate cards in whenever question changes
  useEffect(() => {
    setCardsPhase('enter');
    const q = questions[qIdx];
    // Small delay to ensure refs are attached after render
    const startTimer = setTimeout(() => {
      q.options.forEach((_, i) => {
        setTimeout(() => {
          if (cardsRef.current[i]) cardsRef.current[i].classList.add('visible');
        }, quizActive ? i * 70 : i * 80);
      });
    }, quizActive ? 50 : 200);
    return () => clearTimeout(startTimer);
  }, [qIdx]);
  useEffect(() => {
    let cancelled = false;
    const timers = [];
    // Erster Bump nach 5s auf 128, zweiter nach ~22s auf 129
    timers.push(setTimeout(() => { if (!cancelled) { setCheckCount(128); setBump(true); } }, 5000));
    timers.push(setTimeout(() => { if (!cancelled) setBump(false); }, 5800));
    timers.push(setTimeout(() => { if (!cancelled) { setCheckCount(129); setBump(true); } }, 22000));
    timers.push(setTimeout(() => { if (!cancelled) setBump(false); }, 22800));

    // Ab ~50s weiter realistisch hochzählen – unregelmäßige Intervalle (45–110s)
    const scheduleNext = () => {
      const delay = 45000 + Math.random() * 65000; // 45–110 Sekunden
      const t = setTimeout(() => {
        if (cancelled) return;
        setCheckCount(c => c + 1);
        setBump(true);
        const tOff = setTimeout(() => { if (!cancelled) setBump(false); }, 800);
        timers.push(tOff);
        scheduleNext();
      }, delay);
      timers.push(t);
    };
    // Starte die realistische Hochzählung ~50s nach dem 129-Bump
    timers.push(setTimeout(scheduleNext, 50000));

    return () => { cancelled = true; timers.forEach(clearTimeout); };
  }, []);
  return (
    <div className={`screen active start-screen ${quizActive ? 'quiz-active' : ''}`} style={{ background: 'linear-gradient(180deg, #FFFFFF 0%, #FCE4EC 100%)' }}>
      <div className={`scarcity-banner ${quizActive ? 'fade-when-quiz' : ''}`}>
        <div className="scarcity-dot"></div>
        <span className="scarcity-text">{seats === 1 ? '🔥 ' : '🔥 Nur noch '}<span>{seats === 1 ? 'Letzter Platz' : seats + ' Plätze'}</span>{seats === 1 ? ' für die nächste Schulung!' : ' für die nächste Schulung frei'}</span>
      </div>
      <div className={quizActive ? 'fade-when-quiz' : ''} style={{ padding: '16px 24px 0' }}><Logo /></div>
      <div className="screen-content" style={{ textAlign: 'center' }}>
        <div className="start-col-left">
          <div className={quizActive ? 'fade-when-quiz' : ''}>
            <div className="badge">Kostenloser Eignungs-Check · 60 Sekunden</div>
            <h1 style={{ fontSize: 28, fontWeight: 800, lineHeight: 1.25, marginBottom: 16 }}>
              {window.AB_VARIANT === 'b' ? (
                <>Schluss mit 9–17 Uhr – wird <span style={{ color: '#E91E63' }}>Lash Stylistin</span> dein Weg?</>
              ) : (
                <>Hast du das Zeug zur <span style={{ color: '#E91E63' }}>Lash Stylistin</span>?</>
              )}
            </h1>
            <p className="start-sub" style={{ fontSize: 16, color: '#6B7280', lineHeight: 1.6, marginBottom: 20 }}>
              Finde in 60 Sekunden heraus, ob du als Lash Stylistin durchstarten kannst.
            </p>
          </div>

          <div className="q1-box" ref={boxRef}>
            {quizActive && qIdx > 0 && (
              <button className="q1-back" onClick={() => {
                setCardsPhase('exit');
                setTimeout(() => {
                  const prev = answers.slice(0, -1);
                  setAnswers(prev);
                  setSelected(null);
                  setQIdx(qIdx - 1);
                  if (qIdx === 1) setQuizActive(false);
                }, 250);
              }}>←</button>
            )}
            <div style={{ textAlign: 'center' }}>
              <span className="q1-step-label">
                {qIdx === 0 ? '👆' : `${qIdx + 1}/3 ·`} Frage {qIdx + 1} von 3
              </span>
            </div>
            {quizActive && (
              <div className="q1-progress">
                <div className="q1-progress-fill" style={{ width: `${((qIdx + 1) / questions.length) * 100}%` }}></div>
              </div>
            )}
            <h2 style={{ fontSize: 20, fontWeight: 700, textAlign: 'center', lineHeight: 1.35, marginBottom: 4, marginTop: 0 }}>
              {questions[qIdx].question}
            </h2>
            <p style={{ fontSize: 14, color: '#6B7280', textAlign: 'center', marginBottom: 14 }}>
              {questions[qIdx].subtitle}
            </p>
            <div className={cardsPhase === 'exit' ? 'q1-cards-exit' : ''} style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {questions[qIdx].options.map((opt, i) => (
                <button
                  key={`${qIdx}-${i}`}
                  ref={el => cardsRef.current[i] = el}
                  className={`option-card q1-cards-enter ${selected === i ? 'selected' : ''}`}
                  onClick={() => {
                    if (selected !== null) return;
                    setSelected(i);
                    // TikTok events on first question
                    if (qIdx === 0) {
                      try { window.ttqTrack && window.ttqTrack('ClickButton', { content_name: 'quiz_start' }); } catch(e) {}
                      try { window.ttqTrack && window.ttqTrack('ViewContent', { content_name: 'quiz_question_1' }); } catch(e) {}
                      try { window.fbqTrack && window.fbqTrack('ViewContent', { content_name: 'quiz_start' }); } catch(e) {}
                    }
                    // Track funnel step
                    window.trackFunnelStep && window.trackFunnelStep('/q' + (qIdx + 1));
                    setTimeout(() => {
                      setCardsPhase('exit');
                      setTimeout(() => {
                        const next = [...answers, i];
                        setAnswers(next);
                        setSelected(null);
                        if (qIdx < questions.length - 1) {
                          if (!quizActive) {
                            setQuizActive(true);
                            setTimeout(() => {
                              boxRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 100);
                          }
                          setQIdx(qIdx + 1);
                        } else {
                          // All 3 answered → check qualification and proceed
                          let ok = true;
                          next.forEach((a, j) => { if (!questions[j].options[a].ok) ok = false; });
                          onQuizDone(next, ok);
                        }

function QuestionScreen({ question, index, total, onAnswer, onBack }) {
  const [selected, setSelected] = useState(null);

  useEffect(() => {
    window.trackFunnelStep && window.trackFunnelStep('/q' + (index + 1));

      setTimeout(() => {
        if (cardsRef.current[i]) cardsRef.current[i].classList.add('visible');

          <span style={{ fontSize: 13, fontWeight: 700, color: '#E91E63' }}>{index+1}/{total}</span>

function AnalyzingScreen({ qualified, onDone }) {
  const [step, setStep] = useState(0);
  const [pct, setPct] = useState(0);
  const checks = [
    { text: "Deine Antworten werden ausgewertet...", icon: "📋" },
    { text: "Eignung wird geprüft...", icon: "🔍" },
    { text: "Verfügbare Plätze werden gecheckt...", icon: "📅" },
    { text: qualified ? "Super – du bist qualifiziert! ✨" : "Auswertung abgeschlossen.", icon: qualified ? "🎉" : "📊" },
  ];

  useEffect(() => {
    window.trackFunnelStep && window.trackFunnelStep('/analyzing');
    try { window.ttqTrack && window.ttqTrack('SubmitForm', { content_name: 'quiz_completed' }); } catch(e) {}
    try { window.fbqTrack && window.fbqTrack('CompleteRegistration', { content_name: 'quiz_completed' }); } catch(e) {}
    const timers = [];
    checks.forEach((_, i) => { timers.push(setTimeout(() => setStep(i), i * 500)); });
    timers.push(setTimeout(onDone, checks.length * 500 + 400));
    return () => timers.forEach(clearTimeout);
  }, []);

  useEffect(() => {
    const target = step < checks.length - 1 ? (step + 1) * 25 : 100;
    const t = setInterval(() => setPct(p => p < target ? p + 1 : target), 30);
    return () => clearInterval(t);
  }, [step]);

  const circ = 2 * Math.PI * 42;

  return (
    <div className="screen active" style={{ alignItems: 'center', justifyContent: 'center', padding: '0 24px' }}>
      <Logo size={48} />
      <div style={{ marginTop: 40, marginBottom: 32, position: 'relative', width: 100, height: 100 }}>
        <svg width="100" height="100" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#FCE4EC" strokeWidth="6" />
          <circle cx="50" cy="50" r="42" fill="none"
            stroke={step < checks.length-1 || qualified ? "#E91E63" : "#EF4444"}
            strokeWidth="6" strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - pct/100)}
            style={{ transition: 'stroke-dashoffset 0.3s ease, stroke 0.5s' }} />
        </svg>
        <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', fontSize: 22, fontWeight: 800 }}>
          {pct}%
        </div>
      </div>
      <div style={{ width: '100%', maxWidth: 320 }}>
        {checks.map((item, i) => (
          <div key={i} className={`analyzing-step ${step >= i ? 'active' : ''}`}>
            <div className={`step-icon ${step > i ? 'done' : (step === i ? 'current' : '')}`}>
              {step > i ? "✓" : item.icon}
            </div>
            <span style={{ fontSize: 14, color: step >= i ? '#1A1A1A' : '#6B7280', fontWeight: step === i ? 600 : 400 }}>
              {item.text}
            </span>
          </div>
        ))}
      </div>
      <LegalFooter />
    </div>
  );
}

        </h2>
        <p style={{ fontSize: 15, color: '#6B7280', lineHeight: 1.6, marginBottom: 32, maxWidth: 360 }}>
          Basierend auf deinen Antworten ist die Schulung aktuell nicht das Richtige für dich. Aber keine Sorge – vielleicht passt es zu einem späteren Zeitpunkt!
        </p>
        <div className="tip-card">
          <p style={{ fontSize: 14, fontWeight: 600, marginBottom: 8 }}>💡 Tipp für dich:</p>
          <p style={{ fontSize: 13, color: '#6B7280', margin: 0, lineHeight: 1.6 }}>
            Folge uns auf Instagram <strong>@mycosmetics.rgb</strong> – dort teilen wir regelmäßig Tipps rund ums Beauty-Business. Wenn sich deine Situation ändert, kannst du den Check jederzeit wiederholen.
          </p>
        </div>
        <a href="https://www.instagram.com/mycosmetics.rgb/" target="_blank" rel="noopener" className="btn-secondary" style={{ marginBottom: 12 }}>
          📸 Auf Instagram folgen
        </a>
        <button className="btn-ghost" onClick={onRetry}>Check wiederholen</button>
      </div>
      <LegalFooter />
    </div>
  );
}

// ── App ──

function App() {
  const [screen, setScreen] = useState("start");
  const [answers, setAnswers] = useState([]);
  const [qualified, setQualified] = useState(true);
  const [vorname, setVorname] = useState("");
  const [waNumber, setWaNumber] = useState("");

  const showToast = screen === "start";

  const reset = () => { setScreen("start"); setAnswers([]); setQualified(true); setVorname(""); setWaNumber(""); };

  return (
    <>
      {screen === "start" && <StartScreen onQuizDone={(allAnswers, isQualified) => { setAnswers(allAnswers); setQualified(isQualified); setScreen("analyzing"); }} />}
      {screen === "analyzing" && <AnalyzingScreen qualified={qualified} onDone={() => setScreen(qualified ? "contact" : "disqualified")} />}
      {screen === "contact" && <ContactFormScreen answers={answers} onSubmit={(name, num) => { setVorname(name); setWaNumber(num); setScreen("thankyou"); }} />}
      {screen === "thankyou" && <ThankYouScreen vorname={vorname} waNumber={waNumber} answers={answers} />}
      {screen === "disqualified" && <DisqualifiedScreen onRetry={reset} />}
      <SocialProofToast show={showToast} />
      <CookieBanner />
    </>
  );
}

function CookieBanner() {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    try {
      const stored = document.cookie.split('; ').find(c => c.startsWith('mc_consent='));
      if (!stored) setTimeout(() => setVisible(true), 600);
    } catch(e) { setVisible(true); }
  }, []);
  const save = (value) => {
    try {
      const maxAge = 60 * 60 * 24 * 180;
      document.cookie = `mc_consent=${value}; path=/; max-age=${maxAge}; SameSite=Lax`;
    } catch(e) {}
    setVisible(false);
  };
  if (!visible) return null;
  return (
    <div className="cookie-banner" role="dialog" aria-label="Cookie-Einstellungen">
      <div className="cookie-text">
        <strong>🍪 Cookies:</strong> Wir nutzen notwendige sowie optionale Cookies für Statistik und Marketing. <a href="https://wwwmycosmeticsde.bigcartel.com/lieferung-versand-datenschutz-agb-s-agb-s-lashes-wiederrufsbelehrung" target="_blank" rel="noopener">Datenschutz</a>.
      </div>
      <div className="cookie-actions">
        <button className="cookie-btn secondary" onClick={() => save('essential')}>Nur notwendige</button>
        <button className="cookie-btn primary" onClick={() => save('all')}>Alle akzeptieren</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
